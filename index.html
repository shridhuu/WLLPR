<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WLLPR</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111'/><text x='16' y='21' text-anchor='middle' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='13' font-weight='600' fill='white'>WPR</text></svg>">
<style>
  :root {
    --bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #999999;
    --border: #e5e5e5;
    --accent: #1a1a1a;
    --card-bg: #f7f7f7;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.04);
    --hover-bg: #f2f2f2;
  }

  body.site-dark {
    --bg: #111111;
    --text: #f0f0f0;
    --text-muted: #777777;
    --border: #2a2a2a;
    --accent: #f0f0f0;
    --card-bg: #1a1a1a;
    --card-shadow: 0 1px 3px rgba(0,0,0,0.3);
    --hover-bg: #222222;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    transition: background 0.3s, color 0.3s;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    position: relative;
    width: 100%;
    max-width: 1200px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .logo-mark {
    background: #111;
    color: #fff;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 6px 10px;
    border-radius: 8px;
    line-height: 1;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    display: inline;
  }

  header p {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 400;
    margin-top: 6px;
  }

  body.site-dark .logo-mark {
    background: #fff;
    color: #111;
  }

  .site-theme-btn {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    background: var(--card-bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text);
  }

  .site-theme-btn:hover {
    border-color: var(--text-muted);
    background: var(--hover-bg);
  }

  .site-theme-btn svg { transition: transform 0.3s; }
  body.site-dark .site-theme-btn svg { transform: rotate(180deg); }

  .main-layout {
    display: flex;
    gap: 48px;
    max-width: 1200px;
    width: 100%;
    align-items: flex-start;
  }

  .preview-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 0;
  }

  .preview-container {
    position: relative;
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    padding: 20px;
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: center;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .preview-desktop-wrap {
    flex: 1;
    max-width: 560px;
    min-width: 0;
  }

  .preview-mobile-wrap {
    width: 110px;
    flex-shrink: 0;
  }

  .preview-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-align: center;
    font-weight: 500;
  }

  .preview-desktop-wrap canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
    border: 3px solid #111;
  }

  .preview-mobile-wrap canvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 14px;
    border: 3px solid #111;
  }

  .controls {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .control-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--text-muted);
    font-weight: 500;
  }

  .style-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .style-btn {
    aspect-ratio: 1;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--card-bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    padding: 6px;
  }

  .style-btn:hover { border-color: var(--text-muted); }
  .style-btn.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .style-btn canvas {
    width: 100%;
    height: 100%;
    border-radius: 4px;
  }

  .palette-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .palette-swatch {
    width: 40px;
    height: 28px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    display: flex;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .palette-swatch:hover { border-color: var(--text-muted); }
  .palette-swatch.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .palette-swatch span { flex: 1; }

  .mode-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .mode-btn {
    flex: 1;
    padding: 9px 12px;
    border: none;
    background: var(--card-bg);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .mode-btn + .mode-btn { border-left: 1.5px solid var(--border); }

  .mode-btn.active {
    background: var(--accent);
    color: var(--bg);
  }

  .mode-btn:not(.active):hover {
    background: var(--hover-bg);
  }

  .mode-icon {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    position: relative;
    flex-shrink: 0;
  }

  .mode-btn.active .mode-icon { border-color: var(--bg); }

  .mode-icon-dark {
    background: linear-gradient(135deg, currentColor 50%, transparent 50%);
  }

  .mode-icon-light {
    background: linear-gradient(135deg, transparent 50%, currentColor 50%);
  }

  .seed-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn-shuffle {
    flex: 1;
    padding: 10px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    color: var(--text);
  }

  .btn-shuffle:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--bg);
  }

  .export-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-export {
    padding: 13px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-export:active { transform: scale(0.98); }

  .btn-desktop {
    background: var(--accent);
    color: var(--bg);
  }

  .btn-mobile {
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
  }

  .btn-export:hover { opacity: 0.85; }

  .size-hint {
    font-size: 0.55rem;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  @media (max-width: 800px) {
    body { padding: 24px 16px 80px; }
    header { margin-bottom: 28px; }
    header h1 { font-size: 1.2rem; }
    .site-theme-btn {
      position: static;
      transform: none;
      margin: 12px auto 0;
    }
    .main-layout {
      flex-direction: column;
      gap: 24px;
    }
    .preview-container {
      flex-direction: row;
      gap: 12px;
      padding: 12px;
    }
    .preview-desktop-wrap {
      flex: 1;
      max-width: none;
      min-width: 0;
    }
    .preview-mobile-wrap {
      width: 70px;
      flex-shrink: 0;
    }
    .controls {
      width: 100%;
      gap: 20px;
    }
    .style-grid {
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .palette-row { gap: 6px; }
    .palette-swatch { width: 36px; height: 24px; }
    .export-group {
      flex-direction: row;
      flex-wrap: wrap;
    }
    .btn-export { flex: 1; min-width: 140px; }
    .size-hint { flex-basis: 100%; }
  }

  @media (max-width: 400px) {
    .style-grid { grid-template-columns: repeat(3, 1fr); }
    .preview-mobile-wrap { width: 60px; }
    .export-group { flex-direction: column; }
    .btn-export { min-width: 0; }
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    cursor: pointer;
  }

  .modal-overlay.active { display: flex; }

  .modal-overlay img {
    max-width: 90vw;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .modal-hint {
    color: rgba(255,255,255,0.7);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 16px;
    font-weight: 400;
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 1.5rem;
    cursor: pointer;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    transition: background 0.2s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.1); }

  .modal-info {
    color: rgba(255,255,255,0.5);
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }

  @media print {
    body { padding: 20px; }
    .controls { display: none; }
    .preview-container { box-shadow: none; border: 1px solid #ddd; }
    .site-footer { display: none; }
  }

  .site-footer {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    width: 100%;
    max-width: 1200px;
  }

  .site-footer a {
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    transition: opacity 0.2s;
  }

  .site-footer a:hover { opacity: 0.7; }
</style>
</head>
<body>

    <span class="logo-mark">WPR</span>

  </div>
  <p>Gere o seu papel de parede minimalista</p>
  <button class="site-theme-btn" id="siteThemeBtn" title="Alternar tema do site">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>

<div class="main-layout">

<footer class="site-footer">

  <img id="modalImg" src="" alt="Wallpaper" />
  <div class="modal-hint">Clique com o botão direito e escolha "Salvar imagem como"</div>
  <div class="modal-info" id="modalInfo"></div>
</div>

<script>
const DESKTOP_W = 3840, DESKTOP_H = 2160;
const MOBILE_W = 1290, MOBILE_H = 2796;

const PALETTES = [
  { name: 'Charcoal',   colors: ['#000000','#141414','#2a2a2a','#404040','#595959','#737373','#8c8c8c','#b3b3b3','#d9d9d9','#ffffff'] },
  { name: 'Stone',      colors: ['#1a1714','#2c2825','#3e3a35','#534e47','#6b655c','#857d72','#9f9688','#b8b0a3','#d1c9bd','#ece6dc'] },
  { name: 'Ocean',      colors: ['#060e1a','#0a1628','#12243d','#1a3352','#234568','#2d587f','#3a6d96','#4d84ad','#6a9cc0','#8fb5d4'] },
  { name: 'Dusk',       colors: ['#0f0a14','#1a1020','#2a1832','#3d2248','#52305e','#6a4075','#82528d','#9a68a5','#b280bd','#ca9ad5'] },
  { name: 'Rust',       colors: ['#140e0a','#1f1410','#33201a','#4a2e24','#633e30','#7d5040','#976352','#b07868','#c89080','#dea99a'] },
  { name: 'Forest',     colors: ['#06100a','#0c1a10','#162a1c','#213d2a','#2e523a','#3c684c','#4d7f60','#619776','#78af8e','#92c7a8'] },
];

const PATTERNS = [
  'flowing-hills',
  'smooth-wave',
  'sand-dunes',
  'mountains',
  'concentric-arcs',
  'desert-dunes',
];

const PATTERN_LABELS = [
  'Colinas', 'Onda', 'Dunas', 'Montanhas', 'Arcos', 'Deserto'
];

let currentPattern = 0;
let currentPalette = 0;
let seed = Math.random() * 10000 | 0;
let inverted = false;

function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function noise(x) {
  const ix = Math.floor(x);
  const fx = x - ix;
  const t = fx * fx * (3 - 2 * fx);
  const seedA = Math.sin(ix * 127.1 + seed * 0.01) * 43758.5453;
  const seedB = Math.sin((ix + 1) * 127.1 + seed * 0.01) * 43758.5453;
  const a = seedA - Math.floor(seedA);
  const b = seedB - Math.floor(seedB);
  return a + (b - a) * t;
}

function fbm(x, octaves = 4) {
  let val = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    val += amp * noise(x * freq);
    amp *= 0.5;
    freq *= 2.1;
  }
  return val;
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1+(r2-r1)*t), g = Math.round(g1+(g2-g1)*t), b = Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function getColor(palette, t) {
  const colors = PALETTES[palette].colors;
  const ct = inverted ? 1 - t : t;
  const idx = ct * (colors.length - 1);
  const i = Math.floor(idx);
  const f = idx - i;
  if (i >= colors.length - 1) return colors[colors.length - 1];
  if (i < 0) return colors[0];
  return lerpColor(colors[i], colors[i+1], f);
}

function getBgColor(palette) {
  const colors = PALETTES[palette].colors;
  return inverted ? colors[colors.length - 1] : colors[0];
}

function drawPattern(ctx, w, h, pattern, palette, s) {
  seed = s;
  const rng = mulberry32(s);
  ctx.fillStyle = getBgColor(palette);
  ctx.fillRect(0, 0, w, h);

  switch(PATTERNS[pattern]) {
    case 'flowing-hills':  drawFlowingHills(ctx, w, h, palette, rng); break;
    case 'smooth-wave':    drawSmoothWave(ctx, w, h, palette, rng); break;
    case 'sand-dunes':     drawSandDunes(ctx, w, h, palette, rng); break;
    case 'mountains':      drawMountains(ctx, w, h, palette, rng); break;
    case 'concentric-arcs':drawConcentricArcs(ctx, w, h, palette, rng); break;
    case 'desert-dunes':   drawDesertDunes(ctx, w, h, palette, rng); break;
  }
}

function drawFlowingHills(ctx, w, h, pal, rng) {
  const layers = 6 + (rng() * 4 | 0);
  for (let i = 0; i < layers; i++) {
    const t = (i + 1) / layers;
    const baseY = h * (0.3 + t * 0.55);
    ctx.beginPath();
    ctx.moveTo(0, h);
    for (let x = 0; x <= w; x += 2) {
      const nx = x / w;
      const y = baseY + fbm(nx * 3 + i * 1.7 + rng() * 0.5, 5) * h * 0.2 - h * 0.1;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, t * 0.85 + 0.1);
    ctx.fill();
  }
}

function drawSmoothWave(ctx, w, h, pal, rng) {
  const layers = 8 + (rng() * 5 | 0);
  const centerX = w * (0.45 + rng() * 0.1);
  const baseY = h * (0.55 + rng() * 0.1);
  for (let i = layers; i >= 0; i--) {
    const t = i / layers;
    const spread = w * (0.15 + t * 0.45);
    const peakH = h * (0.08 + t * 0.35);
    const skew = rng() * 0.3 - 0.15;
    ctx.beginPath();
    ctx.moveTo(0, h);
    ctx.lineTo(0, baseY + peakH * 0.5);
    const steps = 120;
    for (let s = 0; s <= steps; s++) {
      const st = s / steps;
      const x = st * w;
      const dist = (x - centerX) / spread;
      const bell = Math.exp(-dist * dist * 2);
      const asymmetry = 1 + skew * dist;
      const wave = bell * peakH * asymmetry;
      const micro = fbm(st * 5 + i * 1.4, 3) * h * 0.008;
      const y = baseY - wave + micro;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8);
    ctx.fill();
  }
}

function drawSandDunes(ctx, w, h, pal, rng) {
  const layers = 7 + (rng() * 5 | 0);
  for (let i = 0; i < layers; i++) {
    const t = (i + 1) / layers;
    const baseY = h * (0.25 + t * 0.6);
    const freq = 1.5 + rng() * 2.5;
    const phase = rng() * 10;
    ctx.beginPath();
    for (let x = 0; x <= w; x += 2) {
      const nx = x / w;
      const wave = Math.sin(nx * Math.PI * freq + phase) * h * 0.06;
      const n = fbm(nx * 2.5 + i * 2.1, 3) * h * 0.08;
      const y = baseY + wave + n;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, t * 0.8 + 0.15);
    ctx.fill();
  }
}

function drawMountains(ctx, w, h, pal, rng) {
  const layers = 5 + (rng() * 3 | 0);
  for (let i = 0; i < layers; i++) {
    const t = (i + 1) / layers;
    const baseY = h * (0.3 + t * 0.55);
    const peakCount = 2 + (rng() * 3 | 0);
    const offset = rng() * 50;
    ctx.beginPath();
    ctx.moveTo(-2, h + 2);
    const peaks = [];
    for (let p = 0; p < peakCount; p++) {
      peaks.push({
        cx: w * (0.1 + rng() * 0.8),
        peakH: h * (0.15 + rng() * 0.3) * (1 - i * 0.1),
        width: w * (0.15 + rng() * 0.2),
      });
    }
    for (let x = -2; x <= w + 2; x += 2) {
      let y = baseY;
      for (const p of peaks) {
        const dist = Math.abs(x - p.cx);
        if (dist < p.width) {
          const rise = (1 - dist / p.width);
          const sharpness = 1.4 + rng() * 0.4;
          const peakY = Math.pow(rise, sharpness) * p.peakH;
          y = Math.min(y, baseY - peakY);
        }
      }
      const micro = fbm((x / w) * 4 + i * 2.3 + offset, 3) * h * 0.01;
      ctx.lineTo(x, y + micro);
    }
    ctx.lineTo(w + 2, h + 2);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, t * 0.8 + 0.12);
    ctx.fill();
  }
}

function drawConcentricArcs(ctx, w, h, pal, rng) {
  const originX = w * (0.6 + rng() * 0.4);
  const originY = h * (0.7 + rng() * 0.4);
  const rings = 12 + (rng() * 8 | 0);
  const maxR = Math.max(w, h) * 1.2;
  for (let i = rings; i >= 0; i--) {
    const t = i / rings;
    const r = maxR * t;
    const thickness = maxR / rings * 1.05;
    ctx.beginPath();
    ctx.arc(originX, originY, r, 0, Math.PI * 2);
    ctx.arc(originX, originY, Math.max(0, r - thickness), 0, Math.PI * 2, true);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8);
    ctx.fill();
  }
}

function drawDesertDunes(ctx, w, h, pal, rng) {
  const layers = 3 + (rng() * 2 | 0);
  const controlPoints = [];
  for (let i = 0; i < layers; i++) {
    const t = (i + 1) / layers;
    const baseY = h * (0.52 + t * 0.35);
    const amp = h * (0.04 + rng() * 0.06);
    const freq = 0.6 + rng() * 0.6;
    const phase = rng() * Math.PI * 2;
    controlPoints.push({ baseY, amp, freq, phase, t });
  }
  for (const cp of controlPoints) {
    ctx.beginPath();
    const points = [];
    for (let x = -4; x <= w + 4; x += 4) {
      const nx = x / w;
      const y = cp.baseY
        - Math.sin(nx * Math.PI * cp.freq + cp.phase) * cp.amp
        - Math.sin(nx * Math.PI * cp.freq * 2.2 + cp.phase * 1.5) * cp.amp * 0.25;
      points.push({ x, y });
    }
    ctx.moveTo(points[0].x, points[0].y);
    for (let j = 0; j < points.length - 1; j++) {
      const p0 = points[j];
      const p1 = points[j + 1];
      const mx = (p0.x + p1.x) / 2;
      const my = (p0.y + p1.y) / 2;
      ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
    }
    const last = points[points.length - 1];
    ctx.lineTo(last.x, last.y);
    ctx.lineTo(w + 4, h + 4);
    ctx.lineTo(-4, h + 4);
    ctx.closePath();
    ctx.fillStyle = getColor(pal, 0.2 + cp.t * 0.65);
    ctx.fill();
  }
}

function drawMiniPattern(ctx, w, h, patternIdx) {
  seed = 42;
  drawPattern(ctx, w, h, patternIdx, 0, 42);
}

function buildStyleGrid() {
  const grid = document.getElementById('styleGrid');
  PATTERNS.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'style-btn' + (i === currentPattern ? ' active' : '');
    btn.title = PATTERN_LABELS[i];
    const c = document.createElement('canvas');
    c.width = 80; c.height = 80;
    btn.appendChild(c);
    grid.appendChild(btn);
    drawMiniPattern(c.getContext('2d'), 80, 80, i);
    btn.onclick = () => {
      currentPattern = i;
      grid.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
  });
}

function buildPaletteRow() {
  const row = document.getElementById('paletteRow');
  PALETTES.forEach((pal, i) => {
    const swatch = document.createElement('button');
    swatch.className = 'palette-swatch' + (i === currentPalette ? ' active' : '');
    swatch.title = pal.name;
    const show = [pal.colors[0], pal.colors[Math.floor(pal.colors.length/2)], pal.colors[pal.colors.length-1]];
    show.forEach(c => {
      const s = document.createElement('span');
      s.style.background = c;
      swatch.appendChild(s);
    });
    row.appendChild(swatch);
    swatch.onclick = () => {
      currentPalette = i;
      row.querySelectorAll('.palette-swatch').forEach(b => b.classList.remove('active'));
      swatch.classList.add('active');
      render();
    };
  });
}

function render() {
  const dCtx = document.getElementById('previewDesktop').getContext('2d');
  const mCtx = document.getElementById('previewMobile').getContext('2d');
  drawPattern(dCtx, 960, 540, currentPattern, currentPalette, seed);
  drawPattern(mCtx, 290, 628, currentPattern, currentPalette, seed);
}

function exportImage(w, h, filename) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  drawPattern(c.getContext('2d'), w, h, currentPattern, currentPalette, seed);
  c.toBlob(function(blob) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  }, 'image/png');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('active');
});
document.getElementById('modalClose').addEventListener('click', function() {
  document.getElementById('modal').classList.remove('active');
});

document.getElementById('siteThemeBtn').onclick = () => {
  document.body.classList.toggle('site-dark');
};

document.getElementById('btnShuffle').onclick = () => {
  seed = Math.random() * 100000 | 0;
  render();
};

document.getElementById('btnDark').onclick = () => {
  inverted = false;
  document.getElementById('btnDark').classList.add('active');
  document.getElementById('btnLight').classList.remove('active');
  render();
};

document.getElementById('btnLight').onclick = () => {
  inverted = true;
  document.getElementById('btnLight').classList.add('active');
  document.getElementById('btnDark').classList.remove('active');
  render();
};

document.getElementById('btnDesktop').onclick = () => {
  exportImage(DESKTOP_W, DESKTOP_H, 'wllpr-desktop-4k.png');
};

document.getElementById('btnMobile').onclick = () => {
  exportImage(MOBILE_W, MOBILE_H, 'wllpr-iphone.png');
};

buildStyleGrid();
buildPaletteRow();
render();
</script>
</body>
</html>
