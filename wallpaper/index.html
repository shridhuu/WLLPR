<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLLPR — Wallpaper</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111'/><text x='16' y='21' text-anchor='middle' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='13' font-weight='600' fill='white'>WPR</text></svg>">
  <link rel="stylesheet" href="../styles.css">
  <style>
    body { overflow: hidden; }

    .viewer {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Back button top-left */
    .viewer-back {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: 0.2s ease;
    }

    .viewer-back:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    /* Bottom floating bar */
    .viewer-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 12px 10px 20px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      white-space: nowrap;
    }

    .bar-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
      margin-right: 4px;
    }

    .bar-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .bar-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }

    .bar-meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .bar-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bar-icon-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: 0.2s ease;
      position: relative;
    }

    .bar-icon-btn:hover {
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    /* Dropdown menu for download */
    .download-dropdown {
      position: absolute;
      bottom: 44px;
      right: 0;
      background: rgba(20, 20, 20, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 6px;
      display: none;
      flex-direction: column;
      min-width: 180px;
    }

    .download-dropdown.open {
      display: flex;
    }

    .download-option {
      padding: 10px 14px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.85);
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: 0.15s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .download-option:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .download-option span {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-left: auto;
    }

    .bar-set-btn {
      padding: 8px 20px;
      border-radius: 50px;
      border: none;
      background: #fff;
      color: #000;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .bar-set-btn:hover {
      background: #e0e0e0;
    }

    .bar-set-btn:disabled {
      opacity: 0.6;
      cursor: default;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(20, 20, 20, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 50px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    @media (max-width: 600px) {
      .viewer-bar {
        width: calc(100% - 32px);
        border-radius: 20px;
        padding: 14px;
        gap: 12px;
        flex-direction: column;
        align-items: stretch;
        bottom: 16px;
      }
      .bar-info {
        align-items: center;
        text-align: center;
        margin-right: 0;
      }
      .bar-actions {
        justify-content: center;
        gap: 8px;
      }
      .bar-set-btn {
        flex: 1;
        text-align: center;
        padding: 10px 20px;
      }
      .download-dropdown {
        bottom: auto;
        top: 44px;
        right: 50%;
        transform: translateX(50%);
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      }
      .toast {
        bottom: 140px;
      }
    }
  </style>
</head>
<body>

<!-- Fullscreen viewer -->
<div class="viewer" id="viewer">
  <canvas id="wallpaperCanvas"></canvas>
</div>

<!-- Back button -->
<a href="../" class="viewer-back">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10 3L4 8l6 5"/></svg>
</a>

<!-- Bottom floating bar -->
<div class="viewer-bar">
  <div class="bar-info">
    <div class="bar-title" id="barTitle"></div>
    <div class="bar-meta" id="barMeta">
      <div class="bar-meta-item">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="10" height="7" rx="1"/><path d="M3 1v2M9 1v2"/></svg>
        <span id="metaRes"></span>
      </div>
      <div class="bar-meta-item">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="5"/><path d="M6 3v3.5l2 1.5"/></svg>
        <span id="metaPattern"></span>
      </div>
      <div class="bar-meta-item" id="metaPaletteName"></div>
    </div>
  </div>

  <div class="bar-actions">
    <!-- Download button with dropdown -->
    <div style="position: relative;">
      <button class="bar-icon-btn" id="btnDownload" title="Download">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v8M5 7l3 3 3-3M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="download-dropdown" id="downloadDropdown">
        <button class="download-option" id="btnDownloadDesktop">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="9" rx="1"/><path d="M5 15h6M8 12v3"/></svg>
          <span>3840×2160</span>
        </button>
        <button class="download-option" id="btnDownloadMobile">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="1" width="8" height="14" rx="2"/><path d="M7.5 12.5h1"/></svg>
          <span>1290×2796</span>
        </button>
      </div>
    </div>

    <!-- Set wallpaper -->
    <button class="bar-set-btn" id="btnSetWallpaper">Set Wallpaper</button>
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3.5 8.5l3 3 6-6"/>
  </svg>
  <span id="toastMsg">Download completed</span>
</div>

<script type="module" src="../js/wallpapers.js?v=10"></script>
<script type="module" src="../js/detail.js?v=10"></script>
<script>
  window.showToast = function(msg) {
    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toastMsg');
    toastMsg.textContent = msg || 'Download completed';
    toast.classList.add('show');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  };
</script>
</body>
</html>
