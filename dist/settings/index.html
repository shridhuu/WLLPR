<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLLPR — Configurações</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111'/><text x='16' y='21' text-anchor='middle' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='13' font-weight='600' fill='white'>WPR</text></svg>">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<nav data-tauri-drag-region>
  <div class="nav-tabs">
    <a href="index.html" class="nav-tab active">Home</a>
    <a href="create/index.html" class="nav-tab">Criar</a>
  </div>

  <div class="nav-actions">
    <button class="nav-icon-btn" id="themeToggle" title="Alternar fundo">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="8" cy="8" r="3.5"/>
        <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4"/>
      </svg>
    </button>
    <a href="settings/index.html" class="nav-icon-btn" title="Configurações">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6.8 2h2.4l.3 1.5a5 5 0 0 1 1.2.7l1.4-.6 1.2 2-1.1 1a5 5 0 0 1 0 1.4l1.1 1-1.2 2-1.4-.6a5 5 0 0 1-1.2.7L9.2 14H6.8l-.3-1.5a5 5 0 0 1-1.2-.7l-1.4.6-1.2-2 1.1-1a5 5 0 0 1 0-1.4l-1.1-1 1.2-2 1.4.6a5 5 0 0 1 1.2-.7L6.8 2z"/>
        <circle cx="8" cy="8" r="2"/>
      </svg>
    </a>
  </div>
</nav>

<main>
  <div class="settings-container">
    <a href="../index.html" class="back-link">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L3 7l6 5"/></svg>
      Voltar
    </a>

    <div class="settings-title">Configurações</div>

    <div class="settings-group">
      <div class="settings-group-label">Aparência</div>

      <div class="settings-row">
        <span class="settings-row-label">Pasta de downloads</span>
        <button class="btn btn-ghost" id="btnPickFolder" style="padding: 6px 14px; font-size: 12px;">
          ~/Downloads
        </button>
      </div>

      <div class="settings-row">
        <span class="settings-row-label">Qualidade do preview</span>
        <select class="settings-select" id="previewQuality">
          <option value="low">Baixa</option>
          <option value="medium" selected>Média</option>
          <option value="high">Alta</option>
        </select>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-label">Papel de Parede</div>

      <div class="settings-row">
        <span class="settings-row-label">Aplicar ao definir papel de parede</span>
        <label class="toggle">
          <input type="checkbox" id="autoApply" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="settings-row">
        <span class="settings-row-label">Resolução desktop padrão</span>
        <select class="settings-select" id="defaultRes">
          <option value="1920x1080">1920×1080</option>
          <option value="2560x1440">2560×1440</option>
          <option value="3840x2160" selected>3840×2160</option>
        </select>
      </div>
    </div>

    <div class="settings-group">
      <div class="settings-group-label">Sobre</div>

      <div class="settings-row">
        <span class="settings-row-label">Versão</span>
        <span class="settings-row-value">0.1.0</span>
      </div>

      <div class="settings-row">
        <span class="settings-row-label">Criador</span>
        <a href="https://www.instagram.com/pedro___neres/" target="_blank" rel="noopener" style="color: var(--text); text-decoration: none; font-size: 13px;">@pedro___neres</a>
      </div>
    </div>
  </div>
</main>

<footer>
  Criado por
  <a href="https://www.instagram.com/pedro___neres/" target="_blank" rel="noopener">@pedro___neres</a>
</footer>

</body>
</html>
